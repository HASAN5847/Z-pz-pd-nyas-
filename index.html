<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZipZip GTA Mod</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; }
        #startScreen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; color: white; text-align: center; }
        .btn { padding: 20px 50px; font-size: 24px; background: #ff4757; border: none; color: white; border-radius: 40px; cursor: pointer; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="startScreen">
        <h1>ZIPZIP GTA MOD</h1>
        <button class="btn" onclick="startGame()">OYUNA BASLA</button>
    </div>

    <script>
        let scene, camera, renderer, player, controls;

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            initGame();
        }

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            
            // KAMERA: Karakterin arkasina yerlestirildi (GTA 5 gibi)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // KARAKTER (Kutu olarak temsil ediliyor)
            player = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), new THREE.MeshPhongMaterial({color: 0xff0000}));
            scene.add(player);

            // BINALAR: Artik sadece cam degil, gri bloklar halinde
            for(let i = 0; i < 20; i++) {
                let h = 10 + Math.random() * 30;
                let b = new THREE.Mesh(new THREE.BoxGeometry(10, h, 10), new THREE.MeshPhongMaterial({color: 0x808080}));
                b.position.set((Math.random()-0.5)*100, h/2, -i*30);
                scene.add(b);
            }

            // ISIK
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            let light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 5);
            scene.add(light);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            // Kamera karakteri takip ediyor
            camera.position.set(player.position.x, player.position.y + 5, player.position.z + 15);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
