<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZipZip Sehir Modu</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 20px; pointer-events: none; }
        #joystick { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; background: rgba(0,0,0,0.3); border-radius: 50%; border: 3px solid white; }
        #jumpBtn { position: absolute; bottom: 50px; right: 50px; width: 100px; height: 100px; background: #ff4757; border-radius: 50%; border: 3px solid white; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui">ZIPZIP SEHIR</div>
    <div id="joystick"></div>
    <div id="jumpBtn">ZIPLA</div>

    <script>
        let scene, camera, renderer, player, planes = [];
        let moveX = 0, moveZ = 0, velocityY = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Karakter
            player = new THREE.Group();
            let body = new THREE.Mesh(new THREE.BoxGeometry(2, 3, 1), new THREE.MeshPhongMaterial({color: 0x0000ff}));
            player.add(body);
            scene.add(player);

            // Zemin
            let floor = new THREE.Mesh(new THREE.BoxGeometry(1000, 1, 1000), new THREE.MeshPhongMaterial({color: 0x555555}));
            scene.add(floor);

            // Binalar ve Balkonlar
            for(let i=0; i<30; i++) {
                let h = 20 + Math.random() * 40;
                let b = new THREE.Mesh(new THREE.BoxGeometry(10, h, 10), new THREE.MeshPhongMaterial({color: 0xaaaaaa}));
                b.position.set((Math.random()-0.5)*400, h/2, (Math.random()-0.5)*400);
                scene.add(b);
                
                // Balkon
                let balcony = new THREE.Mesh(new THREE.BoxGeometry(12, 1, 4), new THREE.MeshPhongMaterial({color: 0x555555}));
                balcony.position.set(b.position.x, h/2, b.position.z + 6);
                scene.add(balcony);
            }

            // Ucaklar
            for(let i=0; i<3; i++) {
                let plane = new THREE.Mesh(new THREE.BoxGeometry(8, 2, 6), new THREE.MeshPhongMaterial({color: 0xffffff}));
                plane.position.set(0, 100 + i*50, -i*200);
                scene.add(plane);
                planes.push(plane);
            }

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            let light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 50, 10);
            scene.add(light);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            player.position.x += moveX * 0.8;
            player.position.z += moveZ * 0.8;
            
            // Ucaklar hareket
            planes.forEach(p => p.position.x += 1);

            camera.position.set(player.position.x, player.position.y + 10, player.position.z + 30);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }

        document.getElementById('joystick').addEventListener('touchmove', (e) => {
            let rect = e.target.getBoundingClientRect();
            moveX = (e.touches[0].clientX - rect.left - 60) / 60;
            moveZ = (e.touches[0].clientY - rect.top - 60) / 60;
        });
        document.getElementById('joystick').addEventListener('touchend', () => { moveX = 0; moveZ = 0; });
        
        init();
    </script>
</body>
</html>
