<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZipZip Flappy</title>
    <style>
        body { margin: 0; overflow: hidden; background: #70c5ce; touch-action: none; }
        #score { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-size: 30px; font-family: sans-serif; pointer-events: none; }
        #jumpBtn { position: absolute; bottom: 0; width: 100%; height: 100%; z-index: 10; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="score">SKOR: 0</div>
    <div id="jumpBtn"></div>

    <script>
        let scene, camera, renderer, bird, obstacles = [];
        let velocity = 0, score = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x70c5ce);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Kus (ZipZip)
            bird = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshBasicMaterial({color: 0xffff00}));
            scene.add(bird);

            // Isik
            scene.add(new THREE.AmbientLight(0xffffff, 1));

            // Zipla
            document.getElementById('jumpBtn').addEventListener('touchstart', () => { velocity = 0.4; });

            animate();
        }

        function createObstacle() {
            let gap = 8;
            let h = Math.random() * 10 + 5;
            let obs = new THREE.Mesh(new THREE.BoxGeometry(3, h*2, 3), new THREE.MeshBasicMaterial({color: 0x2ecc71}));
            obs.position.set(20, -10 + h, 0);
            scene.add(obs);
            obstacles.push(obs);
        }

        function animate() {
            requestAnimationFrame(animate);
            velocity -= 0.02;
            bird.position.y += velocity;

            if(Math.random() < 0.02) createObstacle();

            obstacles.forEach((o, i) => {
                o.position.x -= 0.3;
                if(o.position.x < -20) { scene.remove(o); obstacles.splice(i, 1); score++; document.getElementById('score').innerText = "SKOR: " + score; }
            });

            camera.position.x = bird.position.x;
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
